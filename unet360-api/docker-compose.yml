services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGODB_DB}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: .
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/app:z
      - ${LOCAL_BUCKET_PATH}:${INTERNAL_BUCKET_PATH}:rw,Z
    env_file:
      - .env

volumes:
  mongo_data:
